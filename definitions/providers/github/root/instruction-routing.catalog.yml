# yaml-language-server: $schema=./schemas/instruction-routing.catalog.schema.json
# Instruction Routing Catalog
# Purpose: static tagging for instruction selection (static RAGs routing)
# Notes: keep this file as the single source of truth for routing; do not duplicate rules from copilot-instructions.md.

version: 1
owner: repo

# How this works (static RAGs routing)
# 1) A router prompt reads this file and selects the minimum instruction set for the task.
# 2) The execution prompt/agent then runs with ONLY the selected files (+ mandatory ones).
#
# Design principles:
# - Keep mandatory context small and stable.
# - Prefer 2–5 domain instruction files per task.
# - Use more specific files first; avoid pulling unrelated guidance.
# - This catalog describes selection only; it does not duplicate instruction content.

always:
  # Mandatory context files (load first)
  - path: AGENTS.md
    reason: Mandatory context policy
  - path: copilot-instructions.md
    reason: Global rules and domain mapping

  # Mandatory instruction files (always applied)
  - path: agents/super-agent/ntk-agents-super-agent.instructions.md
    reason: Repository-owned Super Agent lifecycle for intake, planning, specialist routing, validation, review, and closeout
  - path: instructions/governance/ntk-governance-repository-operating-model.instructions.md
    reason: Repository topology, build/test/run commands, style, and domain instruction map
  - path: instructions/governance/ntk-governance-artifact-layout.instructions.md
    reason: Canonical non-versioned artifact layout for build, generated, and deployment outputs
  - path: instructions/governance/ntk-governance-subagent-planning-workflow.instructions.md
    reason: Mandatory planning lifecycle and sub-agent chain for non-trivial work
  - path: instructions/governance/ntk-governance-workflow-optimization.instructions.md
    reason: Task breakdown and token efficiency
  - path: instructions/governance/ntk-governance-authoritative-sources.instructions.md
    reason: Resolve external technical behavior with repository context first and official docs second
  - path: instructions/operations/ntk-operations-powershell-execution.instructions.md
    reason: When running or writing PowerShell
  - path: instructions/governance/ntk-governance-feedback-changelog.instructions.md
    reason: When changing CHANGELOG/feedback

routing:
