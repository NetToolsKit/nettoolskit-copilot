      - "copilot instructions"
      - "instruction"
      - "prompt"
      - "chatmode"
      - "template"
    include:
      - path: instructions/governance/ntk-governance-copilot-instruction-creation.instructions.md
        when: editing instructions/*
      - path: instructions/governance/ntk-governance-prompt-templates.instructions.md
        when: editing prompts or authoring prompts
      - path: instructions/governance/ntk-governance-pr.instructions.md
        when: creating/updating PR-related content

  - id: planning-spec
    tags: [planning, brainstorm, spec, architecture, workflow]
    triggers:
      - "planning"
      - "plan"
      - "brainstorm"
      - "spec"
      - "specification"
      - "design"
      - "design decision"
      - "architecture decision"
      - "workstream"
    include:
      - path: instructions/governance/ntk-governance-brainstorm-spec-workflow.instructions.md
        reason: Brainstorming and versioned specification workflow before execution planning
      - path: instructions/governance/ntk-governance-subagent-planning-workflow.instructions.md
        reason: Planning chain and active/completed workstream lifecycle

  - id: super-agent-workflow
