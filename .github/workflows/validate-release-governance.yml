name: Validate Release Governance

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-release-governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-governance:
    name: Release Governance Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate release governance contracts
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File ./scripts/validation/validate-release-governance.ps1 `
            -RepoRoot $PWD