name: Validate Agent System

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Instructions Runtime, Policies, and Orchestration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agent orchestration contracts
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File ./scripts/validation/validate-agent-orchestration.ps1 `
            -RepoRoot $PWD

      - name: Execute multi-agent pipeline smoke test
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File ./scripts/runtime/run-agent-pipeline.ps1 `
            -RepoRoot $PWD `
            -RunRoot ./.temp/runs `
            -TraceId ci-smoke-run-${{ github.run_id }}-${{ github.run_attempt }} `
            -RequestText "Validate pipeline orchestration in CI"

      - name: Run healthcheck
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File ./scripts/runtime/healthcheck.ps1 `
            -RepoRoot $PWD `
            -TargetGithubPath ./.temp/runtime/github `
            -TargetCodexPath ./.temp/runtime/codex `
            -SyncRuntime `
            -Mirror `
            -StrictExtras `
            -OutputPath ./.temp/healthcheck-report.json `
            -LogPath ./.temp/logs/healthcheck-ci.log

      - name: Export audit report
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File ./scripts/validation/export-audit-report.ps1 `
            -RepoRoot $PWD `
            -TargetGithubPath ./.temp/runtime/github `
            -TargetCodexPath ./.temp/runtime/codex `
            -StrictExtras `
            -OutputPath ./.temp/audit-report.json `
            -HealthcheckOutputPath ./.temp/healthcheck-report.json `
            -LogPath ./.temp/logs/audit-ci.log

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-audit-report
          path: |
            .temp/audit-report.json
            .temp/healthcheck-report.json
            .temp/runs/
            .temp/logs/
          if-no-files-found: warn