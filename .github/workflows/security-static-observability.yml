name: Security Static Observability

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: "45 8 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: security-static-observability-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (actions)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        id: codeql_init
        continue-on-error: true
        uses: github/codeql-action/init@45580472a5bb82c4681c4ac726cfdb60060c2ee1 # v3.32.4
        with:
          languages: actions

      - name: Run CodeQL analysis
        id: codeql_analyze
        continue-on-error: true
        uses: github/codeql-action/analyze@45580472a5bb82c4681c4ac726cfdb60060c2ee1 # v3.32.4

      - name: Emit warning for CodeQL issues
        if: steps.codeql_init.outcome != 'success' || steps.codeql_analyze.outcome != 'success'
        run: |
          echo "::warning::CodeQL encountered issues in observability mode."

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Prepare output directory
        shell: bash
        run: |
          mkdir -p .temp/audit

      - name: Run OpenSSF Scorecard
        id: scorecard
        continue-on-error: true
        uses: ossf/scorecard-action@dc50aa9510b46c811795eb24b2f1ba02a914e534 # v2.3.3
        with:
          results_file: .temp/audit/scorecard.sarif
          results_format: sarif
          publish_results: false

      - name: Emit warning for Scorecard issues
        if: steps.scorecard.outcome != 'success'
        run: |
          echo "::warning::Scorecard encountered issues in observability mode."

      - name: Upload Scorecard SARIF
        if: always() && hashFiles('.temp/audit/scorecard.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@45580472a5bb82c4681c4ac726cfdb60060c2ee1 # v3.32.4
        with:
          sarif_file: .temp/audit/scorecard.sarif

      - name: Upload Scorecard artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-${{ github.run_id }}
          path: .temp/audit/scorecard.sarif
          if-no-files-found: warn
          retention-days: 30